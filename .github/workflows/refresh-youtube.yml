name: YouTube refresh (daily)

on:
  schedule:
    - cron: "30 12 * * *" # every day at 12:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Refresh YouTube data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run refresh-youtube

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json data/sentiment-cache.json
          git diff --cached --quiet && echo "No data changes" && exit 0
          git commit -m "chore: refresh youtube data"
          # The social workflow runs every 10 minutes and the news workflow
          # runs daily too, either of which may have pushed in between this
          # job starting and finishing, so rebase before pushing and retry.
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push failed, retrying ($i)..."
            sleep 5
          done
